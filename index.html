<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wenjin - Concept Design Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d0f14;
      color: #fff;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    h1 { font-size: 3em; margin: 0; }

    header p { color: #aaa; margin-top: 10px; }

    .grid {
      column-count: 3;
      column-gap: 20px;
      padding: 20px;
    }

    @media(max-width: 900px){ .grid{ column-count:2;} }
    @media(max-width: 600px){ .grid{ column-count:1;} }

    .item {
      break-inside: avoid;
      margin-bottom: 20px;
      position: relative;
    }

    .item img {
      width: 100%;
      border-radius: 12px;
      transition: 0.4s;
    }

    .item:hover img {
      transform: scale(1.05);
      filter: brightness(0.6);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      opacity: 0;
      transition: 0.4s;
    }

    .item:hover .overlay { opacity: 1; }

    .overlay h3 { margin: 0; }

    footer {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      border-top: 1px solid #222;
    }

  </style>
</head>
<body>

<header>
  <h1>Wenjin</h1>
  <p>Concept Design Portfolio</p>
</header>

<section class="grid">

  <a href="project1.html" class="item">
    <img src="https://picsum.photos/600/800?1">
    <div class="overlay"><h3>Project 01</h3></div>
  </a>

  <a href="project2.html" class="item">
    <img src="https://picsum.photos/600/700?2">
    <div class="overlay"><h3>Project 02</h3></div>
  </a>

  <a href="project3.html" class="item">
    <img src="https://picsum.photos/600/900?3">
    <div class="overlay"><h3>Project 03</h3></div>
  </a>

</section>

<footer>
  <p>Email: 3536290949@qq.com</p>
  <p>Tel: 17508904590</p>
</footer>

</body>
</html>
