<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wenjin - Concept Design Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d0f14;
      color: #fff;
    }

    header {
      padding: 60px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin: 0;
      letter-spacing: 1px;
    }

    header p {
      color: #aaa;
      margin-top: 10px;
    }

    .grid {
      column-count: 3;
      column-gap: 20px;
      padding: 20px;
    }

    @media(max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media(max-width: 600px) {
      .grid { column-count: 1; }
    }

    .item {
      break-inside: avoid;
      margin-bottom: 20px;
      cursor: pointer;
      position: relative;
    }

    .item img {
      width: 100%;
      border-radius: 12px;
      transition: 0.4s;
    }

    .item:hover img {
      transform: scale(1.03);
      filter: brightness(0.7);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      opacity: 0;
      transition: 0.4s;
    }

    .item:hover .overlay {
      opacity: 1;
    }

    .overlay h3 {
      margin: 0;
      font-size: 1.2em;
    }

    .viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      overflow-y: auto;
      padding: 40px;
      box-sizing: border-box;
    }

    .viewer img {
      width: 100%;
      max-width: 900px;
      margin: 20px auto;
      display: block;
    }

    .close {
      position: fixed;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<header>
  <h1>Wenjin</h1>
  <p>Concept Design Portfolio</p>
</header>

<section class="grid">

  <div class="item" onclick="openProject(0)">
    <img src="https://picsum.photos/600/800?1">
    <div class="overlay"><h3>Project 01</h3></div>
  </div>

  <div class="item" onclick="openProject(1)">
    <img src="https://picsum.photos/600/700?2">
    <div class="overlay"><h3>Project 02</h3></div>
  </div>

  <div class="item" onclick="openProject(2)">
    <img src="https://picsum.photos/600/900?3">
    <div class="overlay"><h3>Project 03</h3></div>
  </div>

</section>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">×</div>
  <div id="content"></div>
</div>

<script>

const projects = [
  [
    "https://picsum.photos/1000/700?11",
    "https://picsum.photos/1000/700?12",
    "https://picsum.photos/1000/700?13"
  ],
  [
    "https://picsum.photos/1000/700?21",
    "https://picsum.photos/1000/700?22"
  ],
  [
    "https://picsum.photos/1000/700?31",
    "https://picsum.photos/1000/700?32"
  ]
];

function openProject(index) {
  const viewer = document.getElementById('viewer');
  const content = document.getElementById('content');

  content.innerHTML = '';

  projects[index].forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    content.appendChild(img);
  });

  viewer.style.display = 'flex';
}

function closeViewer() {
  document.getElementById('viewer').style.display = 'none';
}

</script>

</body>
</html>
